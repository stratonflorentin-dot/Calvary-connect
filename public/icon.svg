<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <rect width="512" height="512" rx="100" fill="#2952A3"/>
  <!-- Truck body -->
  <g transform="translate(64, 150)">
    <!-- Cab -->
    <rect x="220" y="30" width="130" height="130" rx="16" fill="white" opacity="0.95"/>
    <!-- Windshield -->
    <rect x="234" y="45" width="100" height="65" rx="8" fill="#52CAE0" opacity="0.9"/>
    <!-- Truck body/trailer -->
    <rect x="0" y="60" width="232" height="100" rx="12" fill="white" opacity="0.95"/>
    <!-- Stripe on body -->
    <rect x="0" y="90" width="232" height="12" fill="#52CAE0" opacity="0.8"/>
    <!-- Exhaust stack -->
    <rect x="325" y="5" width="14" height="40" rx="4" fill="white" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="60" cy="185" r="35" fill="#1a3a6b"/>
    <circle cx="60" cy="185" r="22" fill="white" opacity="0.3"/>
    <circle cx="60" cy="185" r="10" fill="white" opacity="0.6"/>
    <circle cx="175" cy="185" r="35" fill="#1a3a6b"/>
    <circle cx="175" cy="185" r="22" fill="white" opacity="0.3"/>
    <circle cx="175" cy="185" r="10" fill="white" opacity="0.6"/>
    <circle cx="305" cy="185" r="35" fill="#1a3a6b"/>
    <circle cx="305" cy="185" r="22" fill="white" opacity="0.3"/>
    <circle cx="305" cy="185" r="10" fill="white" opacity="0.6"/>
  </g>
  <!-- CC text -->
  <text x="256" y="430" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white" opacity="0.9" text-anchor="middle" letter-spacing="4">CALVARY</text>
</svg>

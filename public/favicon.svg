  <rect x="2" y="8" width="20" height="12" rx="2" fill="#1e40af"/>
  <rect x="22" y="10" width="8" height="10" rx="1" fill="#3b82f6"/>
  <rect x="4" y="10" width="16" height="8" rx="1" fill="#60a5fa"/>
  <!-- Wheels -->
  <circle cx="7" cy="24" r="3" fill="#1f2937"/>
  <circle cx="17" cy="24" r="3" fill="#1f2937"/>
  <circle cx="25" cy="24" r="2" fill="#1f2937"/>
  <!-- Wheel centers -->
  <circle cx="7" cy="24" r="1" fill="#6b7280"/>
  <circle cx="17" cy="24" r="1" fill="#6b7280"/>
  <circle cx="25" cy="24" r="1" fill="#6b7280"/>
